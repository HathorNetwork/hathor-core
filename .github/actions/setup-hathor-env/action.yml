# yamllint disable rule:line-length
name: setup-hathor-env
description: Setup Hathor node environment
inputs:
  python:
    description: The python version
  os:
    description: The OS name
runs:
  using: composite
  steps:
    - name: Install Poetry
      shell: bash
      run: pipx install poetry

    - name: Set up Python ${{ inputs.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python }}
        cache: 'poetry'

    - name: Configure in-project virtualenv
      shell: bash
      run: poetry config virtualenvs.in-project true

    - name: Cache virtualenv
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-py${{ inputs.python }}-${{ hashFiles('poetry.lock') }}
        restore-keys: |
          venv-${{ runner.os }}-py${{ inputs.python }}-

    - name: Cache htr-rs build
      uses: actions/cache@v4
      with:
        path: htr-rs/target
        key: htr-rs-target-${{ runner.os }}-${{ hashFiles('htr-rs/Cargo.lock', 'htr-rs/crates/**/*.rs', 'htr-rs/**/Cargo.toml') }}
        restore-keys: |
          htr-rs-target-${{ runner.os }}-

    - name: Install Ubuntu dependencies
      if: startsWith(inputs.os, 'ubuntu')
      run: |
        sudo apt-get -qy update
        sudo apt-get -qy install graphviz librocksdb-dev libsnappy-dev liblz4-dev
      shell: bash

    - name: Install macOS dependencies
      if: startsWith(inputs.os, 'macos')
      run: |
        brew cleanup -q
        # brew update -q
        brew install -q graphviz rocksdb pkg-config openssl
        echo "PYCOIN_LIBCRYPTO_PATH=$(brew --prefix openssl)/lib/libcrypto.dylib" >> $GITHUB_ENV
      shell: bash

    - name: Install Poetry dependencies
      run: poetry sync -n --no-root
      shell: bash

    # htr-lib is a develop (editable) maturin dependency. poetry reuses a cached prebuilt wheel
    # for it and does not recompile when only the Rust sources change, so a `poetry sync` can leave
    # a stale htr_lib in the venv (e.g. missing newly added classes). Force a fresh in-venv build
    # from the current htr-rs sources; cargo reuses the cached target dir so unchanged sources relink
    # quickly. Keep this consistent with the documented `maturin develop` workflow in CLAUDE.md.
    - name: Build htr-lib extension from source
      run: |
        poetry run pip install 'maturin>=1.13,<2.0'
        poetry run maturin develop --manifest-path htr-rs/crates/htr-lib-py/Cargo.toml
      shell: bash

# yamllint disable rule:line-length
name: lib_tests
on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
      - dev
    tags:
      - v*
  pull_request:
    branches:
      - master
      - dev
jobs:
  test:
    name: python-${{ matrix.python }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./hathorlib
    timeout-minutes: 40  # default is 360
    strategy:
      matrix:
        python:
          - "3.11"
          - "3.12"
        os:
          - ubuntu-22.04
          - macos-15
    steps:
      - name: Checkout
        # https://github.com/actions/checkout/releases/tag/v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python ${{ matrix.python }}
        # https://github.com/actions/setup-python/releases/tag/v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python }}
      - name: Install Poetry
        run: pip install 'poetry'
      - name: Install Poetry dependencies
        run: poetry install -n --no-root -E client
      - name: Run linters
        run: poetry run make check
      - name: Run tests
        run: poetry run make tests
        continue-on-error: ${{ matrix.tier > 1 }}
      - name: Upload coverage
        uses: codecov/codecov-action@29386c70ef20e286228c72b668a06fd0e8399192 # https://github.com/codecov/codecov-action/releases/tag/v1
        if: matrix.python == 3.11 && startsWith(matrix.os, 'ubuntu')

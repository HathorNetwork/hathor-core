codecov:
  branch: master

coverage:
  # https://docs.codecov.com/docs/coverage-configuration
  range: "80...90"
  # https://docs.codecov.io/docs/commit-status
  status:
    patch:
      # TODO: re-enable patch for the Python codebase in the future
      default: false
      htr-rs:
        target: 90%
        if_ci_failed: error
        only_pulls: true
        flags:
          - htr-rs
    project:
      default:
        # Python target. Scoped to the Python flags, separately from Rust.
        # minimum coverage ratio that the commit must meet to be considered a success
        target: 84%
        if_ci_failed: error
        only_pulls: true
        flags:
          - test-cli
          - test-lib
          - test-other
      htr-rs:
        target: 95%
        if_ci_failed: error
        only_pulls: true
        flags:
          - htr-rs

# The hathor-next crate is an experimental partial Rust port; exclude it from coverage
# measurement until it stabilizes so it doesn't drag the strict htr-rs flag below target.
# hathor-next-py is its PyO3 binding: its logic is exercised by the Python interop tests
# (hathor_tests/p2p/rust_interop/), which the Rust llvm-cov run cannot see, so it is excluded too.
ignore:
  - "htr-rs/crates/hathor-next/"
  - "htr-rs/crates/hathor-next-py/"

flags:
  htr-rs:
    paths:
      - htr-rs/
    # The htr-rs workflow only runs when htr-rs/** changes, so Python-only PRs won't upload
    # this flag — carryforward keeps the metric from the parent commit instead of dropping it.
    carryforward: true

github_checks:
  annotations: true

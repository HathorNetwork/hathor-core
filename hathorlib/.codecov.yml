codecov:
  branch: master

coverage:
  # https://docs.codecov.com/docs/coverage-configuration
  range: "60...80"
  # https://docs.codecov.io/docs/commit-status
  status:
    patch: false
    project:
      default:
        # minimum coverage ratio that the commit must meet to be considered a success
        target: 85%
        if_ci_failed: error
        only_pulls: true
  ignore:
    - hathorlib/nanocontracts/**

github_checks:
  annotations: true
